<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OllamaMerger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #38bdf8;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #cbd5e1;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        textarea { resize: vertical; min-height: 80px; }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #7dd3fc; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85rem;
            border: 1px solid #334155;
        }
        a { color: #38bdf8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back { margin-top: 1rem; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
