services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - shared_models:/models

  ollama-merger:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - shared_models:/app/output
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
  shared_models:
